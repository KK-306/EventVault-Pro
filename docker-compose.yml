version: "3.9"

services:

  backend:
    build: ./server
    container_name: eventvault-backend

    ports:
      - "5000:5000"

    env_file:
      - ./server/.env

    restart: unless-stopped

  frontend:
    build: ./client
    container_name: eventvault-frontend

    ports:
      - "80:80"

    depends_on:
      - backend

    restart: unless-stopped